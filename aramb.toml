# aramb.toml — QR Code Platform
# Application ID: 13c43812-8669-4f0f-b805-f5b5b3c0845f
# Mode: git-connected
# Services: postgres-db, qr-backend (build+runtime), user-app (build+runtime), admin-app (build+runtime)

# ─────────────────────────────────────────────
# 100: PostgreSQL Database (public image, no build service)
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 100
name = "qr-postgres"
type = "postgres"
description = "PostgreSQL 15 database for QR platform"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
image = "postgres:15-alpine"
commandPort = 5432
publicNet = false

[[services.configuration.vars]]
key = "POSTGRES_DB"
value = "qr_platform"

[[services.configuration.vars]]
key = "POSTGRES_USER"
value = "postgres"

[[services.configuration.secrets]]
key = "POSTGRES_PASSWORD"
value = ""

# ─────────────────────────────────────────────
# 101: Backend Build Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 101
name = "qr-backend-build"
type = "build"
description = "Builds the Flask backend Docker image from backend/"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
repoUrl = "https://github.com/sivaram-clode/mar-12-kairo-test"
buildPath = "./backend"
targetBranches = ["feature/qr-platform"]

# ─────────────────────────────────────────────
# 102: Backend Runtime Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 102
name = "qr-backend"
type = "backend"
description = "Flask REST API — auth, QR CRUD, scan tracking, redirect"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
image = "${101.outputs.IMAGE_URL}"
commandPort = 8080
publicNet = true

[[services.configuration.vars]]
key = "PORT"
value = "8080"

[[services.configuration.vars]]
key = "FLASK_ENV"
value = "production"

[[services.configuration.vars]]
key = "ALLOWED_ORIGINS"
value = "${104.outputs.PUBLIC_URL},${106.outputs.PUBLIC_URL}"

[[services.configuration.secrets]]
key = "DATABASE_URL"
value = "postgresql://${100.vars.POSTGRES_USER}:${100.secrets.POSTGRES_PASSWORD}@${100.outputs.PRIVATE_URL}:5432/${100.vars.POSTGRES_DB}"

[[services.configuration.secrets]]
key = "JWT_SECRET_KEY"
value = ""

# ─────────────────────────────────────────────
# 103: User App Build Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 103
name = "qr-user-app-build"
type = "build"
description = "Builds the user-facing Next.js dashboard Docker image from user-app/"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
repoUrl = "https://github.com/sivaram-clode/mar-12-kairo-test"
buildPath = "./user-app"
targetBranches = ["feature/qr-platform"]

# ─────────────────────────────────────────────
# 104: User App Runtime Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 104
name = "qr-user-app"
type = "backend"
description = "Next.js user dashboard — QR creation, scan stats, dynamic URL editing"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
image = "${103.outputs.IMAGE_URL}"
commandPort = 3000
publicNet = true

[[services.configuration.vars]]
key = "NEXT_PUBLIC_API_URL"
value = "${102.outputs.PUBLIC_URL}"

[[services.configuration.vars]]
key = "PORT"
value = "3000"

# ─────────────────────────────────────────────
# 105: Admin App Build Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 105
name = "qr-admin-app-build"
type = "build"
description = "Builds the admin Next.js dashboard Docker image from admin-app/"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
repoUrl = "https://github.com/sivaram-clode/mar-12-kairo-test"
buildPath = "./admin-app"
targetBranches = ["feature/qr-platform"]

# ─────────────────────────────────────────────
# 106: Admin App Runtime Service
# ─────────────────────────────────────────────
[[services]]
uniqueIdentifier = 106
name = "qr-admin-app"
type = "backend"
description = "Next.js admin dashboard — user management, platform analytics"
applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"

[services.configuration.settings]
image = "${105.outputs.IMAGE_URL}"
commandPort = 3001
publicNet = true

[[services.configuration.vars]]
key = "NEXT_PUBLIC_API_URL"
value = "${102.outputs.PUBLIC_URL}"

[[services.configuration.vars]]
key = "PORT"
value = "3001"
