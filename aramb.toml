[[services]]
  uniqueIdentifier = 100
  name = "qr-postgres"
  type = "postgres"
  application = 0
  description = "PostgreSQL 15 database for QR platform"
  id = "a28051b8-5e77-4a78-af70-d200a1ba81ef"
  slug = "qr-postgres-a28051b"
  applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"
  [services.configuration]
    [services.configuration.settings]
      image = "postgres:15-alpine"
      publicNet = false
      commandPort = 5432

    [[services.configuration.vars]]
      key = "POSTGRES_DB"
      value = "qr_platform"

    [[services.configuration.vars]]
      key = "POSTGRES_USER"
      value = "postgres"

    [[services.configuration.secrets]]
      key = "POSTGRES_PASSWORD"
      value = "QkjUgNfZxbCSiG8tuqtdOxlzrQxYe70NoBVoeEtg"

[[services]]
  uniqueIdentifier = 101
  name = "qr-backend-build"
  type = "build"
  application = 0
  description = "Builds the Flask backend Docker image from backend/"
  id = "b8ba3df9-f252-4b8c-8805-e4ebc5ea0727"
  slug = "qr-backend-build-b8ba3df"
  applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"
  [services.configuration]
    [services.configuration.settings]
      repoUrl = "https://github.com/sivaram-clode/mar-12-kairo-test"
      buildPath = "./backend"
      privateBuild = true
      targetBranches = ["feature/qr-platform"]
      installationId = "100292425"

[[services]]
  uniqueIdentifier = 102
  name = "qr-backend"
  type = "backend"
  application = 0
  description = "Flask REST API — auth, QR CRUD, scan tracking, redirect"
  id = "30539747-3a56-4a1f-9ba6-279aa0f2c266"
  slug = "qr-backend-3053974"
  applicationId = "13c43812-8669-4f0f-b805-f5b5b3c0845f"
  [services.configuration]
    [services.configuration.settings]
      image = "${b8ba3df9-f252-4b8c-8805-e4ebc5ea0727.outputs.IMAGE_URL}"
      publicNet = true
      commandPort = 8080

    [[services.configuration.vars]]
      key = "PORT"
      value = "8080"

    [[services.configuration.vars]]
      key = "FLASK_ENV"
      value = "production"

    [[services.configuration.vars]]
      key = "ALLOWED_ORIGINS"
      value = "*"

    [[services.configuration.secrets]]
      key = "DATABASE_URL"
      value = "postgresql://${a28051b8-5e77-4a78-af70-d200a1ba81ef.vars.POSTGRES_USER}:${a28051b8-5e77-4a78-af70-d200a1ba81ef.secrets.POSTGRES_PASSWORD}@${a28051b8-5e77-4a78-af70-d200a1ba81ef.outputs.PRIVATE_URL}:5432/${a28051b8-5e77-4a78-af70-d200a1ba81ef.vars.POSTGRES_DB}"

    [[services.configuration.secrets]]
      key = "JWT_SECRET_KEY"
      value = "5d86d0740b6fbc29e9d7f3f8747adcff91a1e8f8ae8075580302e6aeac1a614f"

